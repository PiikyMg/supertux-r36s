name: Build Port
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: dockcross/linux-arm64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Git and Submodules
        run: |
          # Esto dice: "Confía en todas las carpetas, no me des más errores de permisos"
          git config --global --add safe.directory '*'
          # Esto fuerza la descarga de las piezas internas (las carpetas externas)
          git submodule update --init --recursive
          
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
          libpng-dev libphysfs-dev libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libvorbis-dev \
          libopenal-dev libcurl4-openssl-dev libfreetype6-dev \
          libogg-dev libboost-all-dev libfmt-dev libglm-dev libraqm-dev
          
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4
